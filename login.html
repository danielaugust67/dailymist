        .floating-label-group {
            position: relative;

        .floating-label-group input:not(:placeholder-shown) ~ label {

<label class="font-label-caps text-label-caps" for="email">EMAIL ADDRESS</label>
</div>
<div class="floating-label-group">
<input class="w-full px-4 py-3 bg-transparent border border-outline-variant rounded-lg focus:ring-1 focus:ring-on-background focus:border-on-background transition-all outline-none text-body-md" id="password" placeholder=" " required="" type="password"/>
<label class="font-label-caps text-label-caps" for="password">PASSWORD</label>
</div>
<div class="flex justify-end">
<a class="text-xs font-label-caps text-on-surface-variant hover:text-on-background transition-colors" href="#">Forgot password?</a>
</div>
<button class="w-full bg-on-background text-on-primary py-4 rounded-lg font-label-caps tracking-widest hover:bg-secondary transition-all active:scale-[0.98] duration-200" type="submit">

<script>
        // Micro-interaction for button hover
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
