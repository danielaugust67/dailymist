name: Deploy to VPS via Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t dailymist-app:latest .

      - name: Save Docker Image to Tarball
        run: docker save dailymist-app:latest | gzip > image.tar.gz

      - name: Upload Docker Image to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "image.tar.gz"
          target: "/tmp" 

      - name: Load and Run Docker on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # port: ${{ secrets.VPS_PORT }}
          script: |
            # 1. Load image dari file tar.gz
            docker load -i /tmp/image.tar.gz
            
            # 2. Hapus file tar.gz dari VPS untuk menghemat disk
            rm /tmp/image.tar.gz

            # 3. Hentikan dan hapus container lama (abaikan jika belum ada)
            docker stop dailymist-app || true
            docker rm dailymist-app || true

            # 4. Jalankan container baru
            # Container akan berjalan di port 3000 VPS, restart otomatis jika server reboot
            docker run -d --name dailymist-app --restart unless-stopped -p 3000:3000 dailymist-app:latest
